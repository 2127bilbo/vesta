<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="The Decider"/>
<meta name="theme-color" content="#07070f"/>
<title>The Decider</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:#07070f;overscroll-behavior:none;}
  input,button{-webkit-appearance:none;appearance:none;}
  input::placeholder{color:#888;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const POOL_SIZE = 1000;
const COLORS = [
  "#ff2d55","#ff9f0a","#30d158","#0a84ff","#bf5af2",
  "#ff6b81","#ffd60a","#00c7be","#5e5ce6","#ff8a00",
  "#34c759","#007aff","#af52de","#ff3b30","#5ac8fa",
];

function buildPool(items, riggedItem = null) {
  if (!items.length) return [];
  const weighted = [];
  items.forEach(it => {
    const copies = it === riggedItem ? 8 : 1;
    for (let c = 0; c < copies; c++) weighted.push(it);
  });
  const pool = new Array(POOL_SIZE);
  for (let i = 0; i < POOL_SIZE; i++) pool[i] = weighted[i % weighted.length];
  for (let i = POOL_SIZE - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  if (items.length >= 2) {
    for (let i = 0; i < POOL_SIZE - 1; i++) {
      if (pool[i] === pool[i + 1]) {
        let swapIdx = -1;
        for (let k = i + 2; k < POOL_SIZE; k++) {
          if (pool[k] !== pool[i]) { swapIdx = k; break; }
        }
        if (swapIdx === -1) {
          for (let k = i - 1; k >= 0; k--) {
            if (pool[k] !== pool[i]) { swapIdx = k; break; }
          }
        }
        if (swapIdx !== -1) [pool[i + 1], pool[swapIdx]] = [pool[swapIdx], pool[i + 1]];
      }
    }
  }
  return pool;
}

function createAudio() {
  try { return new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
}
function playTick(ctx, pitch) {
  if (!ctx) return;
  pitch = pitch || 1;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = "square"; o.frequency.setValueAtTime(120 * pitch, ctx.currentTime);
  g.gain.setValueAtTime(0.07, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
  o.start(); o.stop(ctx.currentTime + 0.04);
}
function playReelStop(ctx, reelIdx) {
  if (!ctx) return;
  const freqs = [220, 277, 330];
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = "sine"; o.frequency.setValueAtTime(freqs[reelIdx] || 220, ctx.currentTime);
  g.gain.setValueAtTime(0.18, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
  o.start(); o.stop(ctx.currentTime + 0.18);
}
function playWin(ctx) {
  if (!ctx) return;
  [523, 659, 784, 1047].forEach(function(f, i) {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = "sine"; o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.08);
    g.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.08);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.08 + 0.35);
    o.start(ctx.currentTime + i * 0.08); o.stop(ctx.currentTime + i * 0.08 + 0.35);
  });
}
function playNoMatch(ctx) {
  if (!ctx) return;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = "sawtooth"; o.frequency.setValueAtTime(180, ctx.currentTime);
  o.frequency.linearRampToValueAtTime(80, ctx.currentTime + 0.3);
  g.gain.setValueAtTime(0.12, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
  o.start(); o.stop(ctx.currentTime + 0.3);
}

function Confetti({ color, active, triggerKey }) {
  const canvasRef = useRef(null);
  const rafRef = useRef(null);
  useEffect(() => {
    if (!active) return;
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    const particles = Array.from({ length: 90 }, () => ({
      x: canvas.width / 2 + (Math.random() - 0.5) * 120,
      y: canvas.height * 0.35,
      vx: (Math.random() - 0.5) * 14,
      vy: -Math.random() * 15 - 4,
      size: Math.random() * 7 + 3,
      color: [color, "#fff", "#ffcc00", "#ff6b81"][Math.floor(Math.random() * 4)],
      rot: Math.random() * 360, rotV: (Math.random() - 0.5) * 9, life: 1,
    }));
    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.52;
        p.rot += p.rotV; p.life -= 0.017;
        if (p.life <= 0) return;
        alive = true;
        ctx.save(); ctx.globalAlpha = p.life;
        ctx.translate(p.x, p.y); ctx.rotate((p.rot * Math.PI) / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.5);
        ctx.restore();
      });
      if (alive) rafRef.current = requestAnimationFrame(draw);
    };
    rafRef.current = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(rafRef.current);
  }, [active, color, triggerKey]);
  return (
    <canvas ref={canvasRef} style={{
      position: "absolute", inset: 0, width: "100%", height: "100%",
      pointerEvents: "none", zIndex: 10,
    }} />
  );
}

function SlotReel({ items, spinning, result, reelItems, flashResult }) {
  const VISIBLE = 5;
  const centerIdx = Math.floor(VISIBLE / 2);
  const getColor = n => { const i = items.indexOf(n); return i >= 0 ? COLORS[i % COLORS.length] : "#333"; };
  return (
    <div style={{
      position: "relative", height: 210, overflow: "hidden",
      borderRadius: 8, background: "#060610",
      border: "1px solid rgba(0,170,255,0.18)", marginBottom: 16,
    }}>
      <div style={{ position:"absolute",top:0,left:0,right:0,height:68,background:"linear-gradient(to bottom,#060610,transparent)",zIndex:3,pointerEvents:"none" }} />
      <div style={{ position:"absolute",bottom:0,left:0,right:0,height:68,background:"linear-gradient(to top,#060610,transparent)",zIndex:3,pointerEvents:"none" }} />
      <div style={{
        position:"absolute",top:"50%",left:0,right:0,transform:"translateY(-50%)",height:50,
        background: flashResult ? (getColor(result)+"20") : "rgba(0,170,255,0.05)",
        borderTop: `1px solid ${flashResult ? getColor(result)+"70" : "rgba(0,170,255,0.12)"}`,
        borderBottom: `1px solid ${flashResult ? getColor(result)+"70" : "rgba(0,170,255,0.12)"}`,
        zIndex:2, transition:"all 0.2s",
      }} />
      <div style={{ position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:1 }}>
        {reelItems.map((name, i) => {
          const dist = Math.abs(i - centerIdx);
          const isCenter = i === centerIdx;
          const color = getColor(name);
          return (
            <div key={i} style={{
              height:42, display:"flex", alignItems:"center", justifyContent:"center", width:"100%",
              fontSize: isCenter ? "clamp(17px,5vw,24px)" : "clamp(11px,3vw,15px)",
              fontWeight: isCenter ? 900 : 400,
              color: isCenter ? (flashResult ? color : "#fff") : ("rgba(255,255,255,"+(0.15-dist*0.04)+")"),
              textShadow: isCenter && flashResult ? ("0 0 18px "+color) : "none",
              filter: spinning && !isCenter ? ("blur("+(dist*1.3)+"px)") : "none",
              transition: spinning ? "none" : "all 0.12s",
              userSelect:"none", paddingLeft:16, paddingRight:16,
              textAlign:"center", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
            }}>{name}</div>
          );
        })}
      </div>
    </div>
  );
}

function TripleReel({ items, reels, stopped, flashReels, result }) {
  const getColor = n => { const i = items.indexOf(n); return i >= 0 ? COLORS[i % COLORS.length] : "#333"; };
  const centerIdx = 1;
  return (
    <div style={{ display:"flex", gap:8, marginBottom:16 }}>
      {reels.map((reelItems, ri) => {
        const isFlash = flashReels[ri] && result;
        const centerVal = reelItems[centerIdx];
        const color = getColor(centerVal);
        return (
          <div key={ri} style={{
            flex:1, position:"relative", height:180, overflow:"hidden", borderRadius:8,
            background:"#060610",
            border:`1px solid ${isFlash ? color+"80" : "rgba(0,170,255,0.15)"}`,
            transition:"border-color 0.2s",
          }}>
            <div style={{ position:"absolute",top:0,left:0,right:0,height:52,background:"linear-gradient(to bottom,#060610,transparent)",zIndex:3,pointerEvents:"none" }} />
            <div style={{ position:"absolute",bottom:0,left:0,right:0,height:52,background:"linear-gradient(to top,#060610,transparent)",zIndex:3,pointerEvents:"none" }} />
            <div style={{
              position:"absolute",top:"50%",left:0,right:0,transform:"translateY(-50%)",height:48,
              background: isFlash ? (color+"20") : "rgba(0,170,255,0.05)",
              borderTop:`1px solid ${isFlash ? color+"70" : "rgba(0,170,255,0.1)"}`,
              borderBottom:`1px solid ${isFlash ? color+"70" : "rgba(0,170,255,0.1)"}`,
              zIndex:2, transition:"all 0.2s",
            }} />
            <div style={{ position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:1 }}>
              {reelItems.map((name, i) => {
                const dist = Math.abs(i - centerIdx);
                const isCenter = i === centerIdx;
                const c = getColor(name);
                const isSpinning = !stopped[ri];
                return (
                  <div key={i} style={{
                    height:48, display:"flex", alignItems:"center", justifyContent:"center", width:"100%",
                    fontSize: isCenter ? "clamp(13px,3.5vw,18px)" : "clamp(9px,2.5vw,12px)",
                    fontWeight: isCenter ? 900 : 400,
                    color: isCenter ? (isFlash ? c : "#fff") : ("rgba(255,255,255,"+(0.12-dist*0.04)+")"),
                    textShadow: isCenter && isFlash ? ("0 0 14px "+c) : "none",
                    filter: isSpinning && !isCenter ? ("blur("+(dist*1.5)+"px)") : "none",
                    userSelect:"none", paddingLeft:6, paddingRight:6,
                    textAlign:"center", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                  }}>{name}</div>
                );
              })}
            </div>
            <div style={{
              position:"absolute",bottom:4,right:6,fontSize:8,
              color: stopped[ri] ? (isFlash ? color : "#0af") : "#222",
              letterSpacing:"0.1em", zIndex:4,
            }}>{stopped[ri] ? "●" : "○"}</div>
          </div>
        );
      })}
    </div>
  );
}

function App() {
  const [inputVal, setInputVal]         = useState("");
  const [items, setItems]               = useState([]);
  const [pool, setPool]                 = useState([]);
  const [spinning, setSpinning]         = useState(false);
  const [result, setResult]             = useState(null);
  const [reelItems, setReelItems]       = useState(["?","?","?","?","?"]);
  const [flashResult, setFlash]         = useState(false);
  const [triReels, setTriReels]         = useState([["?","?","?"],["?","?","?"],["?","?","?"]]);
  const [triStopped, setTriStopped]     = useState([false,false,false]);
  const [triFlash, setTriFlash]         = useState([false,false,false]);
  const [noMatch, setNoMatch]           = useState(false);
  const [triAttempts, setTriAttempts]   = useState(0);
  const [bestOf, setBestOf]             = useState(null);
  const [triMode, setTriMode]           = useState(null);
  const [scores, setScores]             = useState({});
  const [seriesWinner, setSeriesWinner] = useState(null);
  const [spinCount, setSpinCount]       = useState(0);
  const [showOdds, setShowOdds]         = useState(false);
  const [history, setHistory]           = useState([]);
  const [confettiKey, setConfettiKey]   = useState(0);
  const [confettiColor, setConfettiColor] = useState("#fff");
  const [showConfetti, setShowConfetti] = useState(false);
  const [riggedItem, setRiggedItem]     = useState(null);
  const [rigPhase, setRigPhase]         = useState("hidden");

  const intervalRef  = useRef(null);
  const triIntervals = useRef([null,null,null]);
  const inputRef     = useRef(null);
  const audioCtx     = useRef(null);
  const longPressRef = useRef(null);

  const getAudio = () => {
    if (!audioCtx.current) audioCtx.current = createAudio();
    if (audioCtx.current && audioCtx.current.state === "suspended") audioCtx.current.resume();
    return audioCtx.current;
  };

  const uniqueItems = [...new Set(items)];

  const rebuildPool = useCallback((its, rigged) => {
    setPool(buildPool(its, rigged));
  }, []);

  const addItem = () => {
    const trimmed = inputVal.trim();
    if (!trimmed) return;
    const newItems = [...items, trimmed];
    setItems(newItems);
    rebuildPool(newItems, riggedItem);
    setInputVal("");
    setResult(null); setFlash(false); setNoMatch(false);
    if (inputRef.current) inputRef.current.focus();
  };

  const removeItem = (name) => {
    const idx = items.lastIndexOf(name);
    const newItems = items.filter((_, i) => i !== idx);
    setItems(newItems);
    const newRigged = riggedItem === name ? null : riggedItem;
    setRiggedItem(newRigged);
    rebuildPool(newItems, newRigged);
    setResult(null); setFlash(false); setNoMatch(false);
  };

  const handleKey = e => { if (e.key === "Enter") addItem(); };

  const resetSeries = () => {
    setScores({}); setSeriesWinner(null);
    setSpinCount(0); setResult(null);
    setFlash(false); setNoMatch(false); setTriAttempts(0);
    setTriStopped([false,false,false]); setTriFlash([false,false,false]);
    setTriReels([["?","?","?"],["?","?","?"],["?","?","?"]]);
  };

  const handleTitleDown = () => {
    longPressRef.current = setTimeout(() => {
      if (navigator.vibrate) navigator.vibrate([30,20,30]);
      setRigPhase(p => {
        if (p === "hidden") return "visible";
        if (p === "visible") return "stealth";
        if (p === "stealth") return "visible";
        return "hidden";
      });
    }, 800);
  };
  const handleTitleUp = () => clearTimeout(longPressRef.current);

  const toggleRig = (name) => {
    if (rigPhase === "hidden") return;
    const newRigged = riggedItem === name ? null : name;
    setRiggedItem(newRigged);
    rebuildPool(items, newRigged);
  };

  const displayOdds = () => {
    if (!uniqueItems.length) return {};
    const pct = (100 / uniqueItems.length).toFixed(1);
    const o = {};
    uniqueItems.forEach(it => { o[it] = pct; });
    return o;
  };

  const buildSequence = (target, length) => {
    length = length || 44;
    const seq = [];
    let prev = "";
    for (let i = 0; i < length; i++) {
      let pick;
      do { pick = uniqueItems[Math.floor(Math.random() * uniqueItems.length)]; }
      while (pick === prev);
      seq.push(pick); prev = pick;
    }
    const tail = [];
    let p = "";
    const others = uniqueItems.filter(x => x !== target);
    const rand = arr => arr[Math.floor(Math.random() * arr.length)];
    const o0 = rand(others.filter(x => x !== p)) || others[0] || target;
    tail[0] = o0; p = o0;
    const o1 = rand(others.filter(x => x !== p)) || others[0] || target;
    tail[1] = o1; p = o1;
    tail[2] = target; p = target;
    const o3 = rand(others.filter(x => x !== p)) || others[0] || target;
    tail[3] = o3; p = o3;
    const o4 = rand(others.filter(x => x !== p)) || others[0] || target;
    tail[4] = o4;
    return [...seq, ...tail];
  };

  const doSingleSpin = (finalResult) => {
    const ctx = getAudio();
    const sequence = buildSequence(finalResult);
    let frameIdx = 0;
    let delay = 36;
    let tickPitch = 1;
    const totalFrames = sequence.length;

    const tick = () => {
      const center = sequence[frameIdx] != null ? sequence[frameIdx] : finalResult;
      const b1 = sequence[frameIdx-1] != null ? sequence[frameIdx-1] : uniqueItems[0];
      const b2 = sequence[frameIdx-2] != null ? sequence[frameIdx-2] : uniqueItems[0];
      const a1 = sequence[frameIdx+1] != null ? sequence[frameIdx+1] : uniqueItems[0];
      const a2 = sequence[frameIdx+2] != null ? sequence[frameIdx+2] : uniqueItems[0];
      setReelItems([b2,b1,center,a1,a2]);
      playTick(ctx, tickPitch);
      if (navigator.vibrate && frameIdx % 3 === 0) navigator.vibrate(7);
      frameIdx++;

      if (frameIdx >= totalFrames) {
        clearInterval(intervalRef.current);
        const fb1 = sequence[totalFrames-2] || uniqueItems[0];
        const fb2 = sequence[totalFrames-3] || uniqueItems[0];
        const oth = uniqueItems.filter(x => x !== finalResult);
        const fa1 = oth[0] || uniqueItems[0];
        const fa2 = oth[1] || oth[0] || uniqueItems[0];
        setReelItems([fb2,fb1,finalResult,fa1,fa2]);
        setResult(finalResult); setFlash(true); setSpinning(false);
        playWin(ctx);
        if (navigator.vibrate) navigator.vibrate([0,50,80,150,80]);
        const winColor = COLORS[uniqueItems.indexOf(finalResult) % COLORS.length];
        setConfettiColor(winColor); setConfettiKey(k => k+1); setShowConfetti(true);
        setTimeout(() => setShowConfetti(false), 2600);
        setHistory(h => [{
          item: finalResult, color: winColor,
          time: new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
        },...h].slice(0,5));
        if (bestOf) {
          setSpinCount(sc => sc+1);
          setScores(prev => {
            const next = {...prev,[finalResult]:(prev[finalResult]||0)+1};
            const winner = Object.entries(next).find(([,v]) => v >= bestOf);
            if (winner) setSeriesWinner(winner[0]);
            return next;
          });
        }
        return;
      }
      if (frameIdx > totalFrames * 0.7) {
        clearInterval(intervalRef.current);
        delay = Math.min(delay * 1.18, 210);
        tickPitch = 1 + (frameIdx / totalFrames) * 0.6;
        intervalRef.current = setInterval(tick, delay);
      }
    };
    intervalRef.current = setInterval(tick, delay);
  };

  const doTripleSpin = (targets) => {
    const ctx = getAudio();
    setTriStopped([false,false,false]);
    setTriFlash([false,false,false]);
    setNoMatch(false);
    const sequences = targets.map(t => buildSequence(t, 36+Math.floor(Math.random()*10)));
    const stopOffsets = [0,400,800];

    sequences.forEach((seq, ri) => {
      let frameIdx = 0;
      let delay = 36 + ri*4;
      let tickPitch = 1;
      const totalFrames = seq.length;

      const tick = () => {
        const center = seq[frameIdx] != null ? seq[frameIdx] : targets[ri];
        const b1 = seq[frameIdx-1] != null ? seq[frameIdx-1] : uniqueItems[0];
        const a1 = seq[frameIdx+1] != null ? seq[frameIdx+1] : uniqueItems[0];
        setTriReels(prev => {
          const next = prev.map(r => [...r]);
          next[ri] = [b1,center,a1];
          return next;
        });
        if (ri === 0) playTick(ctx, tickPitch);
        frameIdx++;

        if (frameIdx >= totalFrames) {
          clearInterval(triIntervals.current[ri]);
          const fb1 = seq[totalFrames-2] || uniqueItems[0];
          const oth = uniqueItems.filter(x => x !== targets[ri]);
          const fa1 = oth[0] || uniqueItems[0];
          setTriReels(prev => {
            const next = prev.map(r => [...r]);
            next[ri] = [fb1,targets[ri],fa1];
            return next;
          });
          setTimeout(() => {
            setTriStopped(prev => { const n=[...prev]; n[ri]=true; return n; });
            playReelStop(ctx, ri);
            if (navigator.vibrate) navigator.vibrate(40+ri*20);

            if (ri === 2) {
              setTimeout(() => {
                const allSame = targets[0]===targets[1] && targets[1]===targets[2];
                if (allSame) {
                  setTriFlash([true,true,true]);
                  setResult(targets[0]);
                  setSpinning(false);
                  playWin(ctx);
                  if (navigator.vibrate) navigator.vibrate([0,60,80,160,80]);
                  const winColor = COLORS[uniqueItems.indexOf(targets[0])%COLORS.length];
                  setConfettiColor(winColor); setConfettiKey(k=>k+1); setShowConfetti(true);
                  setTimeout(()=>setShowConfetti(false),2600);
                  setHistory(h=>[{
                    item:targets[0],color:winColor,
                    time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
                  },...h].slice(0,5));
                  if (bestOf) {
                    setSpinCount(sc=>sc+1);
                    setScores(prev=>{
                      const next={...prev,[targets[0]]:(prev[targets[0]]||0)+1};
                      const winner=Object.entries(next).find(([,v])=>v>=bestOf);
                      if(winner)setSeriesWinner(winner[0]);
                      return next;
                    });
                  }
                } else {
                  setNoMatch(true);
                  setSpinning(false);
                  playNoMatch(ctx);
                  if (navigator.vibrate) navigator.vibrate([80,40,80]);
                  setTriAttempts(a=>a+1);
                }
              }, 300);
            }
          }, stopOffsets[ri]);
          return;
        }

        if (frameIdx > totalFrames * 0.68) {
          clearInterval(triIntervals.current[ri]);
          delay = Math.min(delay*1.2,200);
          tickPitch = 1+(frameIdx/totalFrames)*0.5;
          triIntervals.current[ri] = setInterval(tick,delay);
        }
      };
      triIntervals.current[ri] = setInterval(tick,delay);
    });
  };

  const spin = () => {
    if (items.length < 2 || spinning || seriesWinner) return;
    setSpinning(true);
    setResult(null); setFlash(false); setNoMatch(false); setShowConfetti(false);

    if (!triMode) {
      doSingleSpin(pool[Math.floor(Math.random()*POOL_SIZE)]);
    } else if (triMode === "sure") {
      const r = pool[Math.floor(Math.random()*POOL_SIZE)];
      doTripleSpin([r,r,r]);
    } else {
      doTripleSpin([
        pool[Math.floor(Math.random()*POOL_SIZE)],
        pool[Math.floor(Math.random()*POOL_SIZE)],
        pool[Math.floor(Math.random()*POOL_SIZE)],
      ]);
    }
  };

  useEffect(() => () => {
    clearInterval(intervalRef.current);
    triIntervals.current.forEach(t => clearInterval(t));
  }, []);

  const canSpin = items.length >= 2 && !spinning && !seriesWinner;
  const resultColor = result ? COLORS[uniqueItems.indexOf(result)%COLORS.length] : "#0af";
  const isTriple = !!triMode;
  const odds = displayOdds();

  return (
    <div style={{
      minHeight:"100vh", background:"#07070f",
      fontFamily:"'Courier New',monospace", color:"#e0e0e0",
      display:"flex", flexDirection:"column", alignItems:"center",
      padding:"28px 14px 80px", position:"relative", overflow:"hidden",
    }}>
      {/* Scanlines */}
      <div style={{ position:"fixed",inset:0,pointerEvents:"none",zIndex:0,
        background:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px)" }} />
      {/* Grid */}
      <div style={{ position:"fixed",inset:0,pointerEvents:"none",zIndex:0,
        backgroundImage:"linear-gradient(rgba(0,200,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.03) 1px,transparent 1px)",
        backgroundSize:"44px 44px" }} />

      <div style={{ position:"relative",zIndex:1,width:"100%",maxWidth:500 }}>

        {/* Header */}
        <div style={{ textAlign:"center",marginBottom:22,userSelect:"none" }}>
          <div style={{ fontSize:10,letterSpacing:"0.4em",color:"#0af",marginBottom:5 }}>
            ◈ DECISION ENGINE v2.0 ◈
          </div>
          <h1
            onMouseDown={handleTitleDown} onMouseUp={handleTitleUp}
            onTouchStart={handleTitleDown} onTouchEnd={handleTitleUp}
            style={{
              margin:0, fontSize:"clamp(28px,8vw,50px)",
              fontWeight:900, letterSpacing:"-0.02em", color:"#fff",
              textShadow:"0 0 28px rgba(0,170,255,0.7),0 0 55px rgba(0,170,255,0.2)",
              cursor:"default",
            }}
          >THE DECIDER</h1>
        </div>

        {/* Row 1: Single / Best of 3 / Best of 5 */}
        <div style={{ display:"flex",gap:6,marginBottom:8 }}>
          {[{label:"SINGLE",val:null},{label:"BEST OF 3",val:3},{label:"BEST OF 5",val:5}].map(({label,val}) => (
            <button key={label} onClick={()=>{setBestOf(val);resetSeries();}} style={{
              flex:1, padding:"7px 4px",
              background: bestOf===val ? "#0af" : "#0c0c1a",
              border:`1px solid ${bestOf===val?"#0af":"#566278"}`,
              borderRadius:5, color:bestOf===val?"#000":"#bbb",
              fontFamily:"inherit",fontSize:10,fontWeight:700,
              letterSpacing:"0.1em",cursor:"pointer",transition:"all 0.15s",
            }}>{label}</button>
          ))}
        </div>

        {/* Row 2: Reel mode */}
        <div style={{ display:"flex",gap:6,marginBottom:18 }}>
          {[{label:"1-REEL",val:null},{label:"3-REEL: SURE",val:"sure"},{label:"3-REEL: TRUE",val:"true"}].map(({label,val}) => (
            <button key={label} onClick={()=>{setTriMode(val);resetSeries();}} style={{
              flex:1, padding:"7px 4px",
              background: triMode===val ? "#bf5af2" : "#0c0c1a",
              border:`1px solid ${triMode===val?"#bf5af2":"#566278"}`,
              borderRadius:5, color:triMode===val?"#fff":"#bbb",
              fontFamily:"inherit",fontSize:9,fontWeight:700,
              letterSpacing:"0.06em",cursor:"pointer",transition:"all 0.15s",
            }}>{label}</button>
          ))}
        </div>

        {/* Series scoreboard */}
        {bestOf && items.length>=2 && (
          <div style={{ marginBottom:14,padding:"10px 14px",background:"#0a0a18",border:"1px solid #181828",borderRadius:6 }}>
            <div style={{ fontSize:9,letterSpacing:"0.3em",color:"#2a2a40",marginBottom:8 }}>
              FIRST TO {bestOf} WINS · SPIN {spinCount}
            </div>
            <div style={{ display:"flex",gap:12,flexWrap:"wrap" }}>
              {uniqueItems.map((item,i) => {
                const color=COLORS[i%COLORS.length];
                const wins=scores[item]||0;
                return (
                  <div key={item} style={{ display:"flex",alignItems:"center",gap:5 }}>
                    <div style={{ width:6,height:6,borderRadius:"50%",background:color }} />
                    <span style={{ fontSize:11,color:"#777" }}>{item}</span>
                    <span style={{ fontSize:13,fontWeight:900,color,letterSpacing:"-0.02em" }}>
                      {Array.from({length:bestOf},(_,j)=>(
                        <span key={j} style={{ opacity:j<wins?1:0.15 }}>●</span>
                      ))}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Series winner */}
        {seriesWinner && (
          <div style={{
            marginBottom:14,padding:"14px",
            background:COLORS[uniqueItems.indexOf(seriesWinner)%COLORS.length]+"15",
            border:`1px solid ${COLORS[uniqueItems.indexOf(seriesWinner)%COLORS.length]}50`,
            borderRadius:6,textAlign:"center",
          }}>
            <div style={{ fontSize:9,letterSpacing:"0.3em",color:"#444" }}>SERIES WINNER</div>
            <div style={{
              fontSize:"clamp(20px,6vw,30px)",fontWeight:900,
              color:COLORS[uniqueItems.indexOf(seriesWinner)%COLORS.length],
              textShadow:`0 0 18px ${COLORS[uniqueItems.indexOf(seriesWinner)%COLORS.length]}70`,
            }}>{seriesWinner} 🏆</div>
            <button onClick={resetSeries} style={{
              marginTop:10,padding:"6px 18px",background:"none",
              border:"1px solid #252535",borderRadius:4,color:"#555",
              cursor:"pointer",fontFamily:"inherit",fontSize:10,letterSpacing:"0.2em",
            }}>PLAY AGAIN</button>
          </div>
        )}

        {/* True slots counter */}
        {triMode==="true" && triAttempts>0 && !result && noMatch && (
          <div style={{ textAlign:"center",marginBottom:10,fontSize:11,color:"#ff453a",letterSpacing:"0.2em" }}>
            NO MATCH — ATTEMPT {triAttempts} — SPIN AGAIN
          </div>
        )}
        {triMode==="true" && triAttempts>0 && result && (
          <div style={{ textAlign:"center",marginBottom:10,fontSize:10,color:"#555",letterSpacing:"0.15em" }}>
            MATCHED IN {triAttempts} {triAttempts===1?"ATTEMPT":"ATTEMPTS"}
          </div>
        )}

        {/* Reels */}
        <div style={{ position:"relative" }}>
          {!isTriple
            ? <SlotReel items={uniqueItems} spinning={spinning} result={result} reelItems={reelItems} flashResult={flashResult} />
            : <TripleReel items={uniqueItems} reels={triReels} stopped={triStopped} flashReels={triFlash} result={result} />
          }
          <Confetti color={confettiColor} active={showConfetti} triggerKey={confettiKey} />
        </div>

        {/* Result label */}
        <div style={{ textAlign:"center",minHeight:40,marginBottom:18,display:"flex",alignItems:"center",justifyContent:"center" }}>
          {result && !spinning ? (
            <div>
              <span style={{ fontSize:10,letterSpacing:"0.3em",color:"#333" }}>FATE HAS DECIDED · </span>
              <span style={{ fontSize:14,fontWeight:900,color:resultColor,textShadow:`0 0 12px ${resultColor}80`,letterSpacing:"0.08em" }}>{result}</span>
            </div>
          ) : spinning ? (
            <div style={{ fontSize:10,color:"#0af",letterSpacing:"0.3em" }}>
              {isTriple?"SPINNING REELS...":"SPINNING..."}
            </div>
          ) : noMatch ? (
            <div style={{ fontSize:11,color:"#ff453a",letterSpacing:"0.2em" }}>NO MATCH — TRY AGAIN</div>
          ) : (
            <div style={{ fontSize:10,color:"#1e1e2e",letterSpacing:"0.2em" }}>
              {items.length>=2?"READY · PRESS SPIN":"ADD OPTIONS BELOW"}
            </div>
          )}
        </div>

        {/* Spin button */}
        <button onClick={spin} disabled={!canSpin} style={{
          width:"100%",padding:"17px",marginBottom:22,
          background: canSpin?"linear-gradient(135deg,#0af 0%,#005bcc 100%)":"#0c0c1a",
          border: canSpin?"1px solid #0af":"1px solid #181828",
          borderRadius:6, color:canSpin?"#fff":"#252535",
          fontSize:13,fontFamily:"inherit",fontWeight:900,
          letterSpacing:"0.3em",cursor:canSpin?"pointer":"default",
          textTransform:"uppercase",
          boxShadow:canSpin?"0 0 22px rgba(0,170,255,0.3),inset 0 1px 0 rgba(255,255,255,0.08)":"none",
          transition:"all 0.2s",
        }}>
          {spinning?(isTriple?"⟳  SPINNING REELS...":"⟳  SPINNING..."):seriesWinner?"SERIES COMPLETE":noMatch?"▶  SPIN AGAIN":"▶  SPIN"}
        </button>

        {/* Add item */}
        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:9,letterSpacing:"0.35em",color:"#252535",marginBottom:6 }}>ADD OPTION</div>
          <div style={{ display:"flex",gap:7 }}>
            <input
              ref={inputRef} value={inputVal}
              onChange={e=>setInputVal(e.target.value)}
              onKeyDown={handleKey}
              placeholder="e.g. Olive Garden"
              style={{
                flex:1,padding:"11px 14px",background:"#0b0b18",
                border:"1px solid #566278",borderRadius:5,
                color:"#e0e0e0",fontFamily:"inherit",fontSize:16,outline:"none",
              }}
            />
            <button onClick={addItem} disabled={!inputVal.trim()} style={{
              padding:"11px 20px",
              background:inputVal.trim()?"#0af":"#0c0c1a",
              border:"none",borderRadius:5,
              color:inputVal.trim()?"#000":"#252535",
              fontFamily:"inherit",fontWeight:900,fontSize:18,
              cursor:inputVal.trim()?"pointer":"default",transition:"all 0.15s",
            }}>+</button>
          </div>
        </div>

        {/* Items list */}
        {items.length>0 && (
          <div style={{ marginBottom:18 }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8 }}>
              <div style={{ fontSize:9,letterSpacing:"0.35em",color:"#252535" }}>OPTIONS ({uniqueItems.length})</div>
              <button onClick={()=>setShowOdds(s=>!s)} style={{
                background:"none",border:"1px solid #181828",borderRadius:3,
                color:"#383848",cursor:"pointer",fontSize:9,
                letterSpacing:"0.2em",padding:"3px 8px",fontFamily:"inherit",
              }}>{showOdds?"HIDE":"SHOW"} ODDS</button>
            </div>
            <div style={{ display:"flex",flexDirection:"column",gap:5 }}>
              {uniqueItems.map((item,idx) => {
                const color=COLORS[idx%COLORS.length];
                const isRigged=riggedItem===item;
                const showCheck=rigPhase==="visible";
                return (
                  <div key={item} onClick={()=>showCheck&&toggleRig(item)} style={{
                    display:"flex",alignItems:"center",gap:10,
                    padding:"10px 12px",
                    background:isRigged?"#130a1e":"#0b0b18",
                    border:`1px solid ${isRigged?"#bf5af230":color+"22"}`,
                    borderLeft:`3px solid ${isRigged?"#bf5af2":color}`,
                    borderRadius:5,cursor:showCheck?"pointer":"default",transition:"all 0.15s",
                  }}>
                    {showCheck && (
                      <div style={{
                        width:16,height:16,borderRadius:3,flexShrink:0,
                        border:`1px solid ${isRigged?"#bf5af2":"#2a2a40"}`,
                        background:isRigged?"#bf5af2":"transparent",
                        display:"flex",alignItems:"center",justifyContent:"center",
                        fontSize:11,color:"#fff",
                      }}>{isRigged?"✓":""}</div>
                    )}
                    <div style={{ width:7,height:7,borderRadius:"50%",background:color,flexShrink:0,boxShadow:`0 0 6px ${color}` }} />
                    <div style={{ flex:1,fontSize:13,color:"#bbb" }}>{item}</div>
                    {showOdds && <div style={{ fontSize:11,color,fontWeight:700 }}>{odds[item]}%</div>}
                    <button
                      onClick={e=>{e.stopPropagation();removeItem(item);}}
                      style={{ background:"none",border:"none",color:"#202030",cursor:"pointer",fontSize:18,padding:"0 2px",lineHeight:1,transition:"color 0.15s" }}
                      onTouchStart={e=>e.currentTarget.style.color="#ff453a"}
                      onTouchEnd={e=>e.currentTarget.style.color="#202030"}
                      onMouseEnter={e=>e.currentTarget.style.color="#ff453a"}
                      onMouseLeave={e=>e.currentTarget.style.color="#202030"}
                    >×</button>
                  </div>
                );
              })}
            </div>
            {rigPhase==="visible" && (
              <div style={{ fontSize:9,color:"#4a2a6a",letterSpacing:"0.2em",marginTop:8 }}>
                🥸 RIGGED MODE · CHECK AN ITEM TO WEIGHT IT · LONG PRESS TITLE TO HIDE
              </div>
            )}
          </div>
        )}

        {/* History */}
        {history.length>0 && (
          <div>
            <div style={{ fontSize:9,letterSpacing:"0.35em",color:"#181828",marginBottom:7 }}>RECENT DECISIONS</div>
            <div style={{ display:"flex",flexDirection:"column",gap:4 }}>
              {history.map((h,i) => (
                <div key={i} style={{
                  display:"flex",alignItems:"center",gap:10,
                  padding:"7px 12px",background:"#090912",
                  border:"1px solid #0f0f1a",borderRadius:4,opacity:1-i*0.16,
                }}>
                  <div style={{ width:5,height:5,borderRadius:"50%",background:h.color,flexShrink:0 }} />
                  <div style={{ flex:1,fontSize:12,color:"#555" }}>{h.item}</div>
                  <div style={{ fontSize:10,color:"#222" }}>{h.time}</div>
                </div>
              ))}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
