<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #f5f5f5;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      font-style: italic;
    }
    .status {
      font-size: 13px;
      color: #999;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .status.success {
      color: #4ade80;
    }
    .status.error {
      color: #f87171;
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #D4AF37 0%, #FFD700 50%, #D4AF37 100%);
      border: none;
      border-radius: 8px;
      color: #1a1a1a;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .recipe-preview {
      margin-top: 12px;
      padding: 12px;
      background: #2a2a2a;
      border-radius: 8px;
      font-size: 12px;
    }
    .recipe-preview h3 {
      font-size: 14px;
      margin-bottom: 8px;
      color: #f5f5f5;
    }
    .recipe-preview p {
      color: #999;
      margin-bottom: 4px;
    }
    .settings {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #333;
    }
    .settings label {
      display: block;
      font-size: 12px;
      color: #999;
      margin-bottom: 6px;
    }
    .settings input {
      width: 100%;
      padding: 8px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 6px;
      color: #f5f5f5;
      font-size: 12px;
    }
    .settings input:focus {
      outline: none;
      border-color: #D4AF37;
    }
  </style>
</head>
<body>
  <h1>Vesta</h1>
  <p class="status" id="status">Click "Import Recipe" to extract recipe data from this page.</p>

  <button id="importBtn">Import Recipe</button>

  <div id="preview" class="recipe-preview" style="display: none;">
    <h3 id="previewTitle"></h3>
    <p id="previewMeta"></p>
  </div>

  <div class="settings">
    <label for="vestaUrl">Vesta URL:</label>
    <input type="text" id="vestaUrl" placeholder="https://your-vesta.vercel.app">
  </div>

  <script src="popup.js"></script>
</body>
</html>
